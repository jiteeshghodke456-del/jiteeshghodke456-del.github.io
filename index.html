<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CF Tracker — 800 → 2000</title>
  <meta name="description" content="Personal Codeforces rating tracker and roadmap from 800 to 2000">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Sidebar Nav -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <span class="brand-icon">⚡</span>
        <span class="brand-text">CF Tracker</span>
      </div>
      <div class="nav-items">
        <button class="nav-btn active" data-tab="dashboard" id="nav-dashboard">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span>Dashboard</span>
        </button>
        <button class="nav-btn" data-tab="roadmap" id="nav-roadmap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          <span>Roadmap</span>
        </button>
        <button class="nav-btn" data-tab="tracker" id="nav-tracker">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span>Tracker</span>
        </button>
        <button class="nav-btn" data-tab="thisweek" id="nav-thisweek">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          <span>This Week</span>
        </button>
        <button class="nav-btn" data-tab="notes" id="nav-notes">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span>Notes</span>
        </button>
        <button class="nav-btn" data-tab="resources" id="nav-resources">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
          <span>Resources</span>
        </button>
      </div>
      <div class="sidebar-footer">
        <button class="nav-btn" id="resetBtn" title="Reset all data">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
          <span>Reset</span>
        </button>
      </div>
    </nav>

    <!-- Mobile Header -->
    <header class="mobile-header" id="mobileHeader">
      <button class="hamburger" id="hamburgerBtn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="mobile-title">⚡ CF Tracker</span>
    </header>

    <!-- Main Content -->
    <main class="content" id="content">
      <!-- Dashboard Tab -->
      <section class="tab-panel active" id="tab-dashboard"></section>
      <!-- Roadmap Tab -->
      <section class="tab-panel" id="tab-roadmap"></section>
      <!-- Tracker Tab -->
      <section class="tab-panel" id="tab-tracker"></section>
      <!-- This Week Tab -->
      <section class="tab-panel" id="tab-thisweek"></section>
      <!-- Notes Tab -->
      <section class="tab-panel" id="tab-notes"></section>
      <!-- Resources Tab -->
      <section class="tab-panel" id="tab-resources"></section>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
